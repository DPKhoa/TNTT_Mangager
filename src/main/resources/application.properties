# ==================== Application ====================
spring.application.name=tntt_Manager

# ==================== DataSource ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/tntt_manager
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=TnttManagerHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================== Server ====================
server.port=8080

# ==================== Logging ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==================== JWT ====================
# Secret phai la chuoi Base64 cua it nhat 32 byte (256-bit)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
